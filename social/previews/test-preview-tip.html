<!doctype html>
<html lang="en"><head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Social preview — tip · test-preview</title>
<meta property="og:type" content="website">
<meta property="og:title" content="Social preview — tip · test-preview">
<meta property="og:description" content="FB copy">
<meta property="og:image" content="https://raw.githubusercontent.com/sonat-com/html-reports/main/social/placeholder.png">
<meta name="twitter:card" content="summary_large_image">
<style>
  :root{font-family:-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif}
  body{margin:0;background:#f0f2f5;color:#1c1e21}
  header{padding:20px 16px;text-align:center}
  header h1{margin:0;font-size:18px}
  header p{margin:4px 0 0;color:#65676b;font-size:13px}
  .grid{display:grid;gap:18px;max-width:1100px;margin:0 auto;padding:0 16px 40px;
        grid-template-columns:repeat(auto-fit,minmax(320px,1fr))}
  .card{background:#fff;border-radius:12px;overflow:hidden;
        box-shadow:0 1px 4px rgba(0,0,0,.12);display:flex;flex-direction:column}
  .hd{color:#fff;padding:10px 14px;display:flex;justify-content:space-between;align-items:baseline}
  .hd .name{font-weight:700;font-size:15px}
  .hd .sub{font-size:11px;opacity:.85}
  .ph{width:100%;display:block;background:#e4e6eb;aspect-ratio:1/1;object-fit:cover}
  .body{padding:14px;white-space:pre-wrap;word-wrap:break-word;font-size:14px;line-height:1.45}
  .note{padding:0 14px 14px;color:#65676b;font-size:12px}
</style>
</head><body>
<header><h1>Social preview — tip · test-preview</h1><p>Preview only — how each post will look. Nothing is posted from this page.</p></header>
<main class="grid">
      <section class="card">
        <div class="hd" style="background:#1877F2">
          <span class="name">Facebook</span><span class="sub">Page post</span>
        </div>
        <img class="ph" src="https://raw.githubusercontent.com/sonat-com/html-reports/main/social/placeholder.png" alt="post image">
        <div class="body">FB copy</div>
        
      </section>
      <section class="card">
        <div class="hd" style="background:#E1306C">
          <span class="name">Instagram</span><span class="sub">Feed post</span>
        </div>
        <img class="ph" src="https://raw.githubusercontent.com/sonat-com/html-reports/main/social/placeholder.png" alt="post image">
        <div class="body">IG caption<br><br>🔗 Link in bio</div>
        <div class="note">Caption — links are not clickable (link in bio)</div>
      </section>
      <section class="card">
        <div class="hd" style="background:#0A66C2">
          <span class="name">LinkedIn</span><span class="sub">Company page</span>
        </div>
        <img class="ph" src="https://raw.githubusercontent.com/sonat-com/html-reports/main/social/placeholder.png" alt="post image">
        <div class="body">LI copy</div>
        
      </section>
      <section class="card">
        <div class="hd" style="background:#000000">
          <span class="name">X</span><span class="sub">Post</span>
        </div>
        <img class="ph" src="https://raw.githubusercontent.com/sonat-com/html-reports/main/social/placeholder.png" alt="post image">
        <div class="body">X copy no link</div>
        <div class="note">14/280 characters</div>
      </section>
</main>
</body></html>
